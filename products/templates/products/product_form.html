{% extends 'base.html' %}
{% block title %}{{ action }} Product - IMS{% endblock %}
{% block content %}
<h1>{{ action }} Product</h1>
<form method="post" class="product-form">
    {% csrf_token %}
    <div class="form-group">
        <label>Product Name: *</label>
        <input type="text" name="name" value="{{ product.name }}" required>
    </div>
    <div class="form-group">
        <label>SKU: *</label>
        <input type="text" name="sku" value="{{ product.sku }}" required>
    </div>
    <div class="form-group">
        <label>Category: *</label>
        <select name="category" required>
            <option value="">Select Category</option>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if product.category.id == category.id %}selected{% endif %}>
                {{ category.name }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Supplier: *</label>
        <select name="supplier" required>
            <option value="">Select Supplier</option>
            {% for supplier in suppliers %}
            <option value="{{ supplier.id }}" {% if product.supplier.id == supplier.id %}selected{% endif %}>
                {{ supplier.name }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Unit Price: *</label>
        <input type="number" step="0.01" name="unit_price" value="{{ product.unit_price }}" required>
    </div>
    <div class="form-group">
        <label>Description:</label>
        <textarea name="description" rows="4">{{ product.description }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ action }} Product</button>
    <a href="{% url 'products:list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
